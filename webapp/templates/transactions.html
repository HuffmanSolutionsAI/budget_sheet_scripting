{% extends "base.html" %}
{% block title %}Transactions - Budget Tracker{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>Transactions</h2>
        <button class="btn btn-primary" onclick="showAddModal()">Add Transaction</button>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Search</label>
            <input type="text" id="searchInput" placeholder="Search descriptions..." oninput="debounceLoad()">
        </div>
        <div class="form-group">
            <label>Account</label>
            <select id="accountFilter" onchange="loadTransactions()">
                <option value="">All Accounts</option>
            </select>
        </div>
        <div class="form-group">
            <label>Category</label>
            <select id="categoryFilter" onchange="loadTransactions()">
                <option value="">All Categories</option>
            </select>
        </div>
        <div class="form-group">
            <label>Year</label>
            <select id="yearFilter" onchange="loadTransactions()">
                <option value="">All Years</option>
                {% for y in range(2024, 2028) %}
                <option value="{{ y }}">{{ y }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Month</label>
            <select id="monthFilter" onchange="loadTransactions()">
                <option value="">All Months</option>
                <option value="1">January</option>
                <option value="2">February</option>
                <option value="3">March</option>
                <option value="4">April</option>
                <option value="5">May</option>
                <option value="6">June</option>
                <option value="7">July</option>
                <option value="8">August</option>
                <option value="9">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Account</th>
                    <th>Category</th>
                    <th>Confidence</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="txnBody"></tbody>
        </table>
    </div>

    <div class="pagination">
        <button class="btn btn-outline btn-sm" id="prevBtn" onclick="changePage(-1)">Prev</button>
        <span class="info" id="pageInfo"></span>
        <button class="btn btn-outline btn-sm" id="nextBtn" onclick="changePage(1)">Next</button>
    </div>
</div>

<!-- Add/Edit Modal -->
<div id="txnModal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <h3 id="modalTitle">Add Transaction</h3>
        <input type="hidden" id="editId">
        <div class="form-group" style="margin-bottom:.75rem">
            <label>Date</label>
            <input type="date" id="txnDate">
        </div>
        <div class="form-group" style="margin-bottom:.75rem">
            <label>Description</label>
            <input type="text" id="txnDesc">
        </div>
        <div class="form-group" style="margin-bottom:.75rem">
            <label>Amount</label>
            <input type="number" step="0.01" id="txnAmount">
        </div>
        <div class="form-group" style="margin-bottom:.75rem">
            <label>Account</label>
            <input type="text" id="txnAccount">
        </div>
        <div class="form-group" style="margin-bottom:.75rem">
            <label>Category</label>
            <select id="txnCategory"></select>
        </div>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveTransaction()">Save</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let currentPage = 1;
let debounceTimer;
let allCategories = [];

document.addEventListener('DOMContentLoaded', async () => {
    await loadFilters();
    loadTransactions();
});

async function loadFilters() {
    const [acctRes, catRes] = await Promise.all([
        fetch('/api/accounts'),
        fetch('/api/categories')
    ]);
    const accounts = await acctRes.json();
    allCategories = await catRes.json();

    const acctSel = document.getElementById('accountFilter');
    accounts.forEach(a => {
        acctSel.innerHTML += `<option value="${a}">${a}</option>`;
    });

    const catSel = document.getElementById('categoryFilter');
    const txnCatSel = document.getElementById('txnCategory');
    txnCatSel.innerHTML = '<option value="">Uncategorized</option>';
    allCategories.forEach(c => {
        catSel.innerHTML += `<option value="${c.category}">${c.category}</option>`;
        txnCatSel.innerHTML += `<option value="${c.category}">${c.category} (${c.group})</option>`;
    });
}

function debounceLoad() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => { currentPage = 1; loadTransactions(); }, 300);
}

async function loadTransactions() {
    const params = new URLSearchParams({ page: currentPage, per_page: 50 });
    const search = document.getElementById('searchInput').value;
    const account = document.getElementById('accountFilter').value;
    const category = document.getElementById('categoryFilter').value;
    const year = document.getElementById('yearFilter').value;
    const month = document.getElementById('monthFilter').value;

    if (search) params.set('search', search);
    if (account) params.set('account', account);
    if (category) params.set('category', category);
    if (year) params.set('year', year);
    if (month) params.set('month', month);

    const res = await fetch(`/api/transactions?${params}`);
    const data = await res.json();
    renderTransactions(data);
}

function renderTransactions(data) {
    const tbody = document.getElementById('txnBody');
    tbody.innerHTML = '';

    data.transactions.forEach(t => {
        const cls = t.amount >= 0 ? 'amount-positive' : 'amount-negative';
        tbody.innerHTML += `
            <tr>
                <td>${t.date}</td>
                <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis" title="${escHtml(t.description)}">${escHtml(t.description)}</td>
                <td class="${cls}">${fmt(t.amount)}</td>
                <td>${t.account}</td>
                <td>${t.category || '<em style="color:#aaa">—</em>'}</td>
                <td>${t.confidence ? (t.confidence * 100).toFixed(0) + '%' : ''}</td>
                <td>
                    <button class="btn btn-outline btn-sm" onclick='editTransaction(${JSON.stringify(t)})'>Edit</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteTransaction(${t.id})">Del</button>
                </td>
            </tr>`;
    });

    document.getElementById('pageInfo').textContent = `Page ${data.page} of ${data.pages} (${data.total} total)`;
    document.getElementById('prevBtn').disabled = data.page <= 1;
    document.getElementById('nextBtn').disabled = data.page >= data.pages;
}

function changePage(delta) {
    currentPage += delta;
    loadTransactions();
}

function showAddModal() {
    document.getElementById('modalTitle').textContent = 'Add Transaction';
    document.getElementById('editId').value = '';
    document.getElementById('txnDate').value = new Date().toISOString().slice(0, 10);
    document.getElementById('txnDesc').value = '';
    document.getElementById('txnAmount').value = '';
    document.getElementById('txnAccount').value = '';
    document.getElementById('txnCategory').value = '';
    document.getElementById('txnModal').classList.remove('hidden');
}

function editTransaction(t) {
    document.getElementById('modalTitle').textContent = 'Edit Transaction';
    document.getElementById('editId').value = t.id;
    document.getElementById('txnDate').value = t.date;
    document.getElementById('txnDesc').value = t.description;
    document.getElementById('txnAmount').value = t.amount;
    document.getElementById('txnAccount').value = t.account;
    document.getElementById('txnCategory').value = t.category;
    document.getElementById('txnModal').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('txnModal').classList.add('hidden');
}

async function saveTransaction() {
    const id = document.getElementById('editId').value;
    const body = {
        date: document.getElementById('txnDate').value,
        description: document.getElementById('txnDesc').value,
        amount: parseFloat(document.getElementById('txnAmount').value),
        account: document.getElementById('txnAccount').value,
        category: document.getElementById('txnCategory').value,
    };

    const url = id ? `/api/transactions/${id}` : '/api/transactions';
    const method = id ? 'PUT' : 'POST';

    const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
    });

    if (res.ok) {
        closeModal();
        loadTransactions();
    } else {
        const err = await res.json();
        alert(err.error || 'Error saving transaction');
    }
}

async function deleteTransaction(id) {
    if (!confirm('Delete this transaction?')) return;
    await fetch(`/api/transactions/${id}`, { method: 'DELETE' });
    loadTransactions();
}

function fmt(n) {
    return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n);
}

function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}
</script>
{% endblock %}
